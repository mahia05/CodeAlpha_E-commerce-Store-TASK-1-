<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background-color: white;
            padding: 35px 40px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #0b4646;
        }

        .login-box label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
            color: #333;
        }

        .login-box input[type="text"],
        .login-box input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .login-box input:focus {
            border-color: #0b4646;
            outline: none;
        }

        .login-box button {
            width: 100%;
            padding: 13px;
            background-color: #0b4646;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: bold;
        }

        .login-box button:hover {
            background-color: #093a3a;
        }

        .flash {
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }

        .flash.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .flash.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .back-link {
            text-align: center;
            margin-top: 15px;
        }

        .back-link a {
            color: #0b4646;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>Admin Login</h2>
        <div id="flash-msg"></div>

        <form id="admin-login-form">
            <label>Username</label>
            <input type="text" name="username" placeholder="Admin username" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <div class="back-link">
            <a href="../index.html">Back to Site</a>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script>
        if (localStorage.getItem('admin_token')) {
            window.location.href = 'admin_dashboard.html';
        }

        function showMsg(msg, type) {
            document.getElementById('flash-msg').innerHTML =
                '<div class="flash ' + type + '">' + msg + '</div>';
        }

        document.getElementById('admin-login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const username = this.username.value.trim();
            const password = this.password.value;

            try {
                const res = await fetch(API_BASE + '/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('admin_token', data.token);
                    localStorage.setItem('admin_user', data.username);
                    window.location.href = 'admin_dashboard.html';
                } else {
                    showMsg(data.error || 'Login failed.', 'error');
                }
            } catch (err) {
                showMsg('Cannot connect to server. Make sure backend is running.', 'error');
            }
        });
    </script>
</body>

</html>
