<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
    </nav>
    <div id="flash-msg"></div>
    <main>
        <h2>Your Order History</h2>
        <div id="order-list">
            <p>Loading...</p>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        injectHeader();
        if (!isLoggedIn()) window.location.href = 'login.html';

        async function loadHistory() {
            try {
                const res = await authFetch(`${API_BASE}/orders/history`);
                const orders = await res.json();
                const container = document.getElementById('order-list');
                if (!orders.length) { container.innerHTML = '<p>No past orders found.</p>'; return; }
                container.innerHTML = orders.map(o => {
                    const p = o.product_id;
                    return `<div style="background:white;border-radius:8px;padding:15px;margin:10px auto;max-width:600px;box-shadow:0 2px 6px rgba(0,0,0,0.1);">
                        <h4>${p.name}</h4>
                        <p>Price: ${p.price} tk &nbsp;|&nbsp; Qty: ${o.quantity}</p>
                        <p>Ordered On: ${new Date(o.created_at).toLocaleString()}</p>
                    </div>`;
                }).join('');
            } catch {
                showMessage('Error loading order history.', 'error');
            }
        }
        loadHistory();
    </script>
</body>

</html>
