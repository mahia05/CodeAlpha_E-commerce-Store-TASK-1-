<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Products - Handmade Marketplace</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="signup.html">Sign Up</a>
        <a href="login.html">Login</a>
    </nav>

    <div id="flash-msg"></div>

    <main>
        <div id="product-list">
            <h2 style="text-align:center; color:#0b4646; margin-top:20px;">Products</h2>
            <div class="category-buttons">
                <button onclick="filterCategory('all')">All</button>
                <button onclick="filterCategory('jewelry')">Jewelry</button>
                <button onclick="filterCategory('decor')">Decor</button>
                <button onclick="filterCategory('clothing')">Clothing</button>
                <button onclick="filterCategory('bags')">Bags</button>
            </div>
            <div class="products-container" id="products-container">
                <p style="text-align:center;">Loading products...</p>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        injectHeader();

        // Check if opened in admin view mode
        var isAdminView = window.location.search.indexOf('admin=true') !== -1;

        var allProducts = [];

        async function loadProducts() {
            try {
                var res = await fetch(API_BASE + '/products');
                allProducts = await res.json();
                renderProducts(allProducts);
            } catch (err) {
                document.getElementById('products-container').innerHTML =
                    '<p style="text-align:center; color:red;">Error loading products. Make sure backend is running.</p>';
            }
        }

        function renderProducts(products) {
            var container = document.getElementById('products-container');

            if (!products.length) {
                container.innerHTML = '<p style="text-align:center;">No products found in this category.</p>';
                return;
            }

            container.innerHTML = products.map(function (p) {
                // If admin view, show no Add to Cart button
                var actionBtn = '';
                if (!isAdminView) {
                    actionBtn = '<button onclick="addToCart(\'' + p._id + '\')">Add to Cart</button>';
                }

                return '<div class="product-card" data-category="' + p.category + '">' +
                    '<img src="' + p.image + '" alt="' + p.name + '">' +
                    '<h3>' + p.name + '</h3>' +
                    '<p>' + p.price + ' Tk</p>' +
                    actionBtn +
                    '</div>';
            }).join('');
        }

        function filterCategory(cat) {
            if (cat === 'all') {
                renderProducts(allProducts);
            } else {
                renderProducts(allProducts.filter(function (p) { return p.category === cat; }));
            }
        }

        async function addToCart(productId) {
            if (!isLoggedIn()) {
                localStorage.setItem('pending_product', productId);
                window.location.href = 'login.html';
                return;
            }
            try {
                var res = await authFetch(API_BASE + '/cart/add', {
                    method: 'POST',
                    body: JSON.stringify({ product_id: productId })
                });
                var data = await res.json();

                if (res.ok) {
                    showMessage('Product added to cart!', 'success');
                } else {
                    showMessage(data.error || 'Could not add to cart.', 'error');
                }
            } catch (err) {
                showMessage('Server error.', 'error');
            }
        }

        loadProducts();
    </script>
</body>

</html>
